<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ugly J..... Scientific calculator</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="calculator"> 
    <h1> Scientific Calculator</h1>
    <input type="text" id="display" autofocus value="" onfocus="this.setSelectionRange(this.value.length, this.value.length)">
  <h2>Scientific Functions</h2>
  <div class="scientific-buttons">
    <button id="btnSin" type="button">sin</button>
    <button id="btnCos" type="button">cos</button>
    <button id="btnTan" type="button">tan</button>
    <button id="btnArcsin" type="button">arcsin</button>
    <button id="btnArcos" type="button">arccos</button>

    <button id="btnArctan" type="button">arctan</button>
    <button id="btnLog" type="button">log</button>
    <button id="btnAntilog" type="button">antilog</button>
    <button id="btnLn" type="button">ln</button>
    <button id="btnSqrt">√</button>

    <button id="btnsquare">x²</button>
    <button id="btnRecip">1/x</button>
    <button id="btnCube">x³</button>
    <button id="btnPow">^</button>
    <button id="btnFact" type="button">x!</button>

    <button id="btnPermute" type="button">P(n,r)</button>
    <button id="btnComb" type="button">C(n,r)</button>
    <button id="btnMod" type="button">mod</button>
    <button id="btnPi">π</button>
    <button id="btnREPLAY" type="button">REPLAY</button>

    <button id="btnDeg" type="button">DEG</button>
    <button id="btnRad" type="button">RAD</button>
    <button id="btnGrad" type="button">GRAD</button>
    <button id="btnOpenbracket" type="button">(</button>
    <button id="btnClosebracket" type="button">)</button>
  </div>
  <div class="buttons"> 
    <button id="btn7">7</button>
    <button id="btn8" type="button">8</button>
    <button id="btn9" type="button">9</button>
    <button id="btnDEL" type="button">DEL</button>
    <button id="btnAC" type="button">AC</button>

    <button id="btn4" type="button">4</button>
    <button id="btn5" type="button">5</button>
    <button id="btn6" type="button">6</button>
    <button id="btnMul" type="button">*</button>
    <button id="btnDiv" type="button">/</button>

    <button id="btn1" type="button">1</button>
    <button id="btn2" type="button">2</button>
    <button id="btn3" type="button">3</button>
    <button id="btnAdd" type="button">+</button>
    <button id="btnSub" type="button">-</button>

    <button id="btn0" type="button">0</button>
    <button id="btnDot" type="button">.</button>
    <button id="btnEXP" type="button">EXP</button>
    <button id="btnAns" type="button">Ans</button>
    <button id="btnEq" type="button">=</button>
  </div>
</div>
 <script src="script.js?v=2"></script>
  </body>
</html>
